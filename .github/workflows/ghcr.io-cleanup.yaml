name: daily ghcr.io image cleanup
on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:
jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: dataaxiom/ghcr-cleanup-action@v1.2.2
        with:
          owner: ${{ github.repository_owner }}
          packages: builds
